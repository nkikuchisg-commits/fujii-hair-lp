<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>髪 ふじ井 — OGP banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;700&family=Marcellus&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --brand:#24406a; --dark:#1e2b40; --gold:#b3903f; --text:#2f3a4a; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Shippori Mincho B1","Noto Sans JP",serif; color: var(--text);
    background:
      radial-gradient(60% 80% at 88% 6%, #dde3ef 0%, transparent 55%),
      radial-gradient(56% 66% at 6% 98%, #efe7d2 0%, transparent 50%),
      linear-gradient(160deg, #fbfaf5 0%, #f3f0e4 100%);
    display: flex; align-items: center; position: relative; overflow: hidden;
  }
  .frame { position: absolute; inset: 30px; border: 2px dashed rgba(36,64,106,.3); border-radius: 20px; }
  .inner { position: relative; padding: 0 84px; max-width: 780px; }
  .en { font-family:"Marcellus",serif; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); font-size:29px; margin-bottom:14px; }
  h1 { font-family:"Shippori Mincho B1",serif; font-weight:700; color:var(--dark); font-size:72px; letter-spacing:.03em; line-height:1.32; margin-bottom:22px; }
  h1 b { color: var(--brand); }
  .rule { width: 92px; height: 5px; border-radius: 6px; background: linear-gradient(90deg, var(--gold), var(--brand)); margin-bottom: 22px; }
  .tag { font-size: 29px; color: #434d5c; font-weight: 500; margin-bottom: 12px; font-family:"Noto Sans JP",sans-serif; }
  .area { font-size: 24px; color: var(--brand); letter-spacing: .04em; font-weight: 700; font-family:"Noto Sans JP",sans-serif; }
  .orb {
    position: absolute; right: 114px; top: 50%; transform: translateY(-50%);
    width: 288px; height: 288px; border-radius: 50%;
    background:
      radial-gradient(circle at 38% 30%, #d3ddec 0 15%, transparent 16%),
      conic-gradient(from 210deg, #274a7a, #3a5c8c, #20386a, #2f4f80, #274a7a);
    box-shadow: inset 0 -10px 24px rgba(12,24,48,.55), inset 0 12px 22px rgba(215,224,238,.4), 0 16px 34px rgba(24,45,76,.3);
  }
  .orb::before { content:""; position:absolute; inset:24%; border-radius:50%; border:2px solid rgba(179,144,63,.7); }
  .orb::after { content:""; position:absolute; inset:38%; border-radius:50%; background: radial-gradient(circle at 42% 36%, rgba(216,189,119,.9), rgba(179,144,63,.5)); }
  .badge { position: absolute; right: 54px; bottom: 50px; background: var(--dark); color: #fff; font-size: 19px; letter-spacing: .08em; font-weight: 500; padding: 9px 20px; border-radius: 999px; font-family:"Noto Sans JP",sans-serif; }
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="inner">
    <div class="en">3D Zoumou &amp; Aging Care — Ageo</div>
    <h1>分け目もボリュームも、<br><b>あきらめない</b>髪へ。</h1>
    <div class="rule"></div>
    <div class="tag">3D増毛 × 大人の髪エイジングケア</div>
    <div class="area">埼玉・上尾／髪 ふじ井</div>
  </div>
  <div class="orb" aria-hidden="true"></div>
  <div class="badge">ホームページ提案サンプル</div>
</body>
</html>
